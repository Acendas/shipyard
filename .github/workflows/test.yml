name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  eval:
    name: Evals (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run eval suite
        run: python plugins/shipyard/tests/eval-run.py --verbose

      - name: Run unit tests
        run: python -m unittest plugins/shipyard/tests/test_auto_approve_data.py -v
